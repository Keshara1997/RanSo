<!-- Toolbar icon — always visible -->
<button
  mat-icon-button
  class="search-toggle hide-lt-sm"
  (click)="toggleSearchVisibility()"
  [matTooltip]="'labels.text.Search' | translate"
>
  <fa-icon icon="search" size="lg"></fa-icon>
</button>

<!-- Spotlight modal -->
@if (searchVisible) {
  <div class="search-backdrop" [@backdropFade] (click)="closeModal()" role="dialog" aria-modal="true">
    <div class="spotlight-wrap" [@modalSlide] (click)="$event.stopPropagation()">
      <!-- Input row -->
      <div class="spotlight-row">
        <fa-icon icon="search" class="spotlight-icon"></fa-icon>

        <input
          #queryInput
          class="spotlight-input"
          type="text"
          [formControl]="query"
          [placeholder]="'labels.text.Search' | translate"
          (keydown.enter)="search()"
          autocomplete="off"
          spellcheck="false"
        />

        <button
          class="spotlight-go"
          type="button"
          (click)="search()"
          [attr.aria-label]="'labels.text.Search' | translate"
        >
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </div>

      <!-- Resource filter chips -->
      <div class="filter-row">
        @for (option of resourceOptions; track option) {
          <button
            class="filter-chip"
            [class.filter-chip--active]="resource.value === option.value"
            (click)="resource.patchValue(option.value)"
            type="button"
          >
            {{ 'labels.text.' + option.name | translate }}
          </button>
        }
      </div>
    </div>
  </div>
}
